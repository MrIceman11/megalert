services:
  mikrotik-sms-gateway:
    build: .
    ports:
      - "5000:5000"
    environment:
      MEGALERT_HOST: "0.0.0.0"
      MEGALERT_PORT: "5000"
      MEGALERT_DEBUG: "false"
      MIKROTIK_HOST: "192.168.10.2"
      MIKROTIK_PORT: "8728"
      MIKROTIK_USER: "sms-api"
      MIKROTIK_PASS: "secret"
      MIKROTIK_SMS_PORT: "lte1"
      API_TOKEN: "change-me"
      ALLOWED_COUNTRY_CODES: "49"
      MAX_MESSAGE_LENGTH: "480"
      RATE_LIMIT_PER_MINUTE: "10"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
